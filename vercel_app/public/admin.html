                <form id="courseForm" class="space-y-6">

                    <!-- 기본 정보 -->

                            <input type="text" id="contact"

                    <div class="pt-6 border-t flex justify-end">

            <!-- 섹션 3: 교육 과정 관리 (수정/삭제) -->
            <div id="section-manage" class="hidden">

                    <div>
                        <h2 class="text-xl font-bold text-gray-800">🛠️ 교육 과정 관리</h2>
                        <p class="text-sm text-gray-500 mt-1">등록된 교육 과정을 수정하거나 삭제할 수 있습니다.</p>
                    </div>
                    <button onclick="fetchManage()"

                </div>

                <div class="overflow-x-auto border rounded-xl">

                        <thead class="bg-gray-50">
                            <tr>
                                <th
                                    class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                    과정명</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">
                                    일시</th>
                                <th
                                    class="px-6 py-3 text-center text-xs font-bold text-gray-500 uppercase tracking-wider">
                                    관리</th>

    <!-- 로그인 모달 -->
    <div id="login-modal"
        class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-75 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 transform transition-all">
            <div class="text-center mb-8">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">관리자 로그인</h2>
                <p class="text-sm text-gray-500 mt-2">접근 권한을 확인하기 위해 비밀번호를 입력해주세요.</p>
            </div>
            <form onsubmit="event.preventDefault(); tryLogin();" class="space-y-6">
                <div>
                    <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="login-password" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                        placeholder="비밀번호 입력" autofocus>
                </div>
                <button type="submit"
                    class="w-full bg-blue-900 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-800 transition-colors shadow-lg transform active:scale-95">
                    로그인
                </button>
            </form>
        </div>
    </div>

    <script>
        // ★★★ Vercel 배포용 프록시 URL ★★★
        const scriptURL = '/api/proxy';

        let allCourses = {}; // 데이터 저장용
        let editingCourseId = null; // 현재 수정 중인 ID
        let cachedPassword = null; // 로그인한 비밀번호 저장

        // 초기 로드 시 자동 실행 방지 (로그인 대기)
        window.onload = function () {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                const testData = {
                    "test_admin": { category: "실무자 역량강화 교육", title: "★관리자 로컬 미리보기 테스트★", date: "2026. 12. 31(목)", capacity: 40, current: 2, deadline: "2026-12-25" }
                };
                cachedPassword = "test";
                renderStatusTable(testData, document.getElementById('status-body'));
            }
        };

        function tryLogin() {
            const pwdInput = document.getElementById('login-password');
            const pwd = pwdInput.value;

            if (!pwd) return alert('비밀번호를 입력해주세요.');

            // 검증을 위해 가벼운 데이터 요청 시도 (GET)
            fetch(scriptURL + '?type=admin', {
                method: 'GET',
                headers: { 'x-admin-password': pwd }
            })
                .then(res => {
                    if (res.status === 401) throw new Error('비밀번호가 올바르지 않습니다.');
                    if (!res.ok) throw new Error('서버 오류가 발생했습니다.');
                    return res.json();
                })
                .then(data => {
                    // 로그인 성공
                    cachedPassword = pwd;
                    document.getElementById('login-modal').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');

                    // 비밀번호 입력란 자동 채우기 (기존 폼 호환성)
                    const adminPwdField = document.getElementById('adminPassword');
                    if (adminPwdField) adminPwdField.value = pwd;

                    renderStatusTable(data, document.getElementById('status-body'));
                })
                .catch(err => {
                    alert(err.message);
                    pwdInput.value = '';
                    pwdInput.focus();
                });
        }

        function switchTab(tabId) {
            // 버튼 스타일 초기화
            ['register', 'status', 'manage'].forEach(id => {
                const btn = document.getElementById('tab-' + id);
                if (btn) {
                    btn.className = "py-2 px-4 text-gray-500 font-medium hover:text-gray-700 focus:outline-none transition-colors";
                    btn.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600', 'font-bold');
                }
                const section = document.getElementById('section-' + id);
                if (section) section.classList.add('hidden');
            });

            // 선택된 탭 활성화
            const activeHeader = document.getElementById('tab-' + tabId);
            if (activeHeader) {
                activeHeader.classList.remove('text-gray-500', 'font-medium');
                activeHeader.classList.add('text-blue-600', 'border-b-2', 'border-blue-600', 'font-bold');
            }

            const activeSection = document.getElementById('section-' + tabId);
            if (activeSection) activeSection.classList.remove('hidden');

            if (tabId === 'status') fetchStatus();
            if (tabId === 'manage') fetchManage();
        }

        // --- 기능 1: 과정 등록/수정 ---
        function submitCourse() {
            const btn = document.getElementById('btn-submit');
            const originalText = btn.innerText;
            const pwd = cachedPassword; // 저장된 비밀번호 사용

            if (!pwd) return alert('로그인 세션이 만료되었습니다. 다시 로그인해주세요.');

            const actionType = editingCourseId ? "수정" : "등록";
            if (!confirm(`이대로 교육 과정을 ${actionType}하시겠습니까?`)) return;

            btn.innerText = "처리 중...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('action', editingCourseId ? 'update_course' : 'add_course');
            if (editingCourseId) formData.append('id', editingCourseId);
            formData.append('password', pwd);

            // 데이터 매핑
            ['category', 'title', 'date', 'place', 'capacity', 'deadline', 'target', 'goal', 'content', 'instructor', 'contact', 'paymentInfo', 'otherInfo'].forEach(field => {
                const el = document.getElementById(field);
                if (el) formData.append(field, el.value);
            });

            const data = new URLSearchParams(formData);

            fetch(scriptURL + '?type=admin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'x-admin-password': pwd // Proxy 인증용 헤더 추가
                },
                body: data
            })
                .then(response => response.json())
                .then(result => {
                    if (result.result === 'success') {
                        alert(`✅ 교육 과정이 성공적으로 ${actionType}되었습니다!`);
                        if (editingCourseId) cancelEdit(); // 수정 모드 종료
                        else {
                            document.getElementById('courseForm').reset();
                            document.getElementById('adminPassword').value = pwd; // 비밀번호는 유지 편의성
                        }
                    } else {
                        alert(`⛔ ${actionType} 실패: ` + result.msg);
                    }
                    btn.innerText = originalText;
                    btn.disabled = false;
                })
                .catch(error => {
                    alert('서버 연결 실패: ' + error.message);
                    console.error(error);
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
        }

        // --- 기능 2: 신청자 현황 조회 ---
        function fetchStatus() {
            const tbody = document.getElementById('status-body');
            if (!cachedPassword) return; // 로그인 전이면 중단

            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-blue-600 font-bold"><span class="animate-pulse">데이터를 불러오는 중입니다...</span></td></tr>';

            fetch(scriptURL + '?type=admin', {
                method: 'GET',
                headers: { 'x-admin-password': cachedPassword }
            })
                .then(response => response.json())
                .then(data => renderStatusTable(data, tbody))
                .catch(err => handleError(tbody, err));
        }

        function renderStatusTable(data, tbody) {
            tbody.innerHTML = '';
            if (data.result === 'error') {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-500 font-bold">오류: ${data.msg}</td></tr>`;
                return;
            }

            const now = new Date();
            let hasData = false;

            // 1. 날짜순 정렬 (오름차순)
            const courses = Object.keys(data).map(key => data[key]).sort((a, b) => {
                const parseDate = (str) => {
                    try {
                        const parts = str.match(/(\d{4})[\.\s]+(\d{1,2})[\.\s]+(\d{1,2})/);
                        if (parts) return new Date(`${parts[1]}-${parts[2]}-${parts[3]}`);
                        return new Date(9999, 11, 31); // 파싱 실패시 뒤로
                    } catch (e) { return new Date(9999, 11, 31); }
                };
                return parseDate(a.date) - parseDate(b.date);
            });

            if (courses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-500">데이터가 없습니다.</td></tr>';
                return;
            }

            courses.forEach(item => {
                let statusBadge = `<span class="px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded-full">접수중</span>`;
                const cap = parseInt(item.capacity || 0);
                const cur = parseInt(item.current || 0);

                if (cap > 0 && cur >= cap) statusBadge = `<span class="px-2 py-1 bg-gray-100 text-gray-500 text-xs font-bold rounded-full">정원마감</span>`;

                if (item.deadline) {
                    const deadlineDate = new Date(item.deadline);
                    deadlineDate.setHours(23, 59, 59, 999);
                    if (now > deadlineDate) statusBadge = `<span class="px-2 py-1 bg-gray-100 text-gray-500 text-xs font-bold rounded-full">기한마감</span>`;
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50 border-b">
                        <td class="px-6 py-4">${statusBadge}</td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900 flex items-center">
                                ${item.title}
                            </div>
                            <div class="text-xs text-gray-500">${item.category}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-500 text-sm">${item.date}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="w-full bg-gray-200 rounded-full h-2.5 mr-2 max-w-[100px]">
                                    <div class="bg-blue-600 h-2.5 rounded-full" style="width: ${cap > 0 ? Math.min((cur / cap) * 100, 100) : 0}%"></div>
                                </div>
                                <span class="text-sm font-bold text-gray-700">${cur} / ${cap > 0 ? cap : '-'}명</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-500 text-sm">${item.deadline ? item.deadline.split('T')[0] : '상시/별도'}</td>
                    </tr>`;
            });
        }

        // --- 기능 3: 관리 (수정/삭제) ---
        function fetchManage() {
            const tbody = document.getElementById('manage-body');
            
            // [로컬 검사용 데이터]
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                const mockData = {
                    "test_admin": { id: "test_admin", category: "실무자 역량강화 교육", title: "★관리자 로컬 미리보기 테스트★", date: "2026. 12. 31(목)" }
                };
                allCourses = mockData;
                renderManageTable(mockData, tbody);
                return;
            }

            tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-blue-600 font-bold"><span class="animate-pulse">데이터를 불러오는 중입니다...</span></td></tr>';

            fetch(scriptURL + '?type=admin', {
                method: 'GET',
                headers: { 'x-admin-password': cachedPassword }
            })
                .then(response => response.json())
                .then(data => {
                    allCourses = data; // 데이터 전역 저장
                    renderManageTable(data, tbody);
                })
                .catch(err => {
                    console.error("Error fetching for manage:", err);
                    tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-red-500">데이터 불러오기 실패</td></tr>';
                    alert('데이터 불러오기 실패: ' + err.message);
                });
        }

        function renderManageTable(data, tbody) {
            tbody.innerHTML = '';
            const courses = Object.keys(data).map(key => data[key]);

            if (courses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-10 text-center text-gray-500">데이터가 없습니다.</td></tr>';
                return;
            }

            courses.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">
                            <div class="text-sm font-bold text-gray-900">${item.title}</div>
                            <div class="text-xs text-gray-500">${item.category}</div>
                        </td>
                        <td class="px-6 py-4 text-gray-500 text-sm">${item.date}</td>
                        <td class="px-6 py-4 text-center whitespace-nowrap">
                            <button onclick="loadCourseForEdit('${item.id}')" class="text-blue-600 hover:text-blue-900 font-bold mr-2 border border-blue-200 px-3 py-1 rounded hover:bg-blue-50 transition-colors">수정</button>
                            <button onclick="deleteCourse('${item.id}')" class="text-red-600 hover:text-red-900 font-bold border border-red-200 px-3 py-1 rounded hover:bg-red-50 transition-colors">삭제</button>
                        </td>
                    </tr>`;
            });
        }

        // 수정 모드 진입
        function loadCourseForEdit(id) {
            const data = allCourses[id];
            if (!data) return alert('정보를 찾을 수 없습니다.');

            editingCourseId = id;

            // 탭 전환
            switchTab('register');

            // 폼 채우기
            document.getElementById('category').value = data.category;
            document.getElementById('title').value = data.title;
            document.getElementById('date').value = data.date;
            document.getElementById('place').value = data.place;
            document.getElementById('capacity').value = data.capacity;
            document.getElementById('deadline').value = data.deadline ? data.deadline.split('T')[0] : '';
            document.getElementById('target').value = data.target;
            document.getElementById('goal').value = data.goal;
            document.getElementById('content').value = data.content;
            document.getElementById('instructor').value = data.instructor;
            document.getElementById('contact').value = data.contact;
            document.getElementById('paymentInfo').value = data.paymentInfo;
            document.getElementById('otherInfo').value = data.otherInfo;

            // UI 변경
            document.getElementById('edit-header').classList.remove('hidden');
            document.getElementById('edit-course-title').innerText = data.title;
            document.getElementById('btn-submit').innerText = '교육 과정 수정하기';
            document.getElementById('btn-submit').classList.remove('bg-blue-900', 'hover:bg-blue-800');
            document.getElementById('btn-submit').classList.add('bg-yellow-600', 'hover:bg-yellow-500');

            window.scrollTo(0, 0);
        }

        // 수정 취소
        function cancelEdit() {
            editingCourseId = null;
            document.getElementById('courseForm').reset();
            document.getElementById('edit-header').classList.add('hidden');

            const btn = document.getElementById('btn-submit');
            btn.innerText = '교육 과정 등록하기';
            btn.classList.remove('bg-yellow-600', 'hover:bg-yellow-500');
            btn.classList.add('bg-blue-900', 'hover:bg-blue-800');
        }

        // 삭제
        function deleteCourse(id) {
            const pwd = cachedPassword; // 저장된 비밀번호 사용
            if (!pwd) return alert('로그인이 필요합니다.');

            if (!confirm("정말로 이 과정을 삭제하시겠습니까?\n삭제 후에는 복구할 수 없습니다.")) return;

            const formData = new FormData();
            formData.append('action', 'delete_course');
            formData.append('id', id);
            formData.append('password', pwd);

            fetch(scriptURL + '?type=admin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'x-admin-password': pwd // Proxy 인증용 헤더 추가
                },
                body: new URLSearchParams(formData)
            })
                .then(response => response.json())
                .then(result => {
                    if (result.result === 'success') {
                        alert('🗑️ 삭제되었습니다.');
                        fetchManage(); // 목록 갱신
                    } else {
                        alert('⛔ 삭제 실패: ' + result.msg);
                    }
                })
                .catch(err => alert('오류 발생: ' + err));
        }

        function handleError(tbody, err) {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-500">데이터 로드 실패</td></tr>`;
        }

    </script>
</body>

</html>
